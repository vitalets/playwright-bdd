name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      release-version:
        description: Release version type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      prerelease:
        description: Pre-release (beta)
        required: false
        type: boolean
        default: false
      skip-npm-publish:
        description: Skip NPM publish
        required: false
        type: boolean
        default: false
      dry-run:
        description: Dry run
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write # For git operations (commit, tag, push)
      id-token: write # Required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v6

      - name: Ensure lint/test/examples workflows passed
        run: |
          gh run list --workflow=lint.yaml --branch=${{ github.ref_name }} --limit=1 --json conclusion --jq '.[0].conclusion' | grep -q "success" || (echo "lint.yaml workflow must pass before publishing" && exit 1)
          gh run list --workflow=test.yaml --branch=${{ github.ref_name }} --limit=1 --json conclusion --jq '.[0].conclusion' | grep -q "success" || (echo "test.yaml workflow must pass before publishing" && exit 1)
          gh run list --workflow=examples.yaml --branch=${{ github.ref_name }} --limit=1 --json conclusion --jq '.[0].conclusion' | grep -q "success" || (echo "examples.yaml workflow must pass before publishing" && exit 1)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run knip
      - run: npm run lint
      - run: npm run prettier
      - run: npm run docs:validate
      - run: npm run build
      - run: npm run tsc:all
      - run: npx publint

      - uses: vitalets/npm-release@v1
        with:
          release-version: ${{ inputs.release-version }}
          prerelease: ${{ inputs.prerelease }}
          skip-npm-publish: ${{ inputs.skip-npm-publish }}
          dry-run: ${{ inputs.dry-run }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

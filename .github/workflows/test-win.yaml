name: test-win

on:
  push:
    branches: [main, beta, test-win]
  pull_request:
    branches: [main, beta]
  schedule:
    # run daily at 00:00
    - cron: 0 0 * * *

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  get-playwright-versions:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - id: get-versions
        run: |
          # Scheduled runs should cover only a real beta and skip when beta is already obsolete.
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            versions=$(node scripts/get-pw-versions.ts beta)
          else
            versions=$(node scripts/get-pw-versions.ts latest)
          fi
          echo "versions=$versions" >> "$GITHUB_OUTPUT"

  test-win:
    needs: get-playwright-versions
    if: needs.get-playwright-versions.outputs.versions != '[]'
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      matrix:
        playwrightVersion: ${{ fromJson(needs.get-playwright-versions.outputs.versions) }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24 # use v24 to hopefully run faster
          cache: 'npm'
      - run: npm ci
      - run: >
          npm install
          @playwright/test@${{ matrix.playwrightVersion }}
          @playwright/experimental-ct-react@${{ matrix.playwrightVersion }}
      - run: npx playwright install --with-deps chromium
      - name: run tests
        run: |
          # don't use 'npm t' here as it doesn't expand filename wildcards
          node test/setup.mjs
          node --test test/**/test.mjs
          # run particular test
          # node --test test/reporter-cucumber-html/test.mjs
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: test-results-${{ matrix.playwrightVersion }}
          path: |
            test/**/test-results/
            test/**/actual-reports/
            test/**/blob-report/
            test/**/.features-gen/
          retention-days: 1
          if-no-files-found: ignore

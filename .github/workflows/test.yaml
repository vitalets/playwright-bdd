name: test

on:
  push:
    # Define all branches explicitly to not trigger actions on tag creation
    # See: https://github.com/orgs/community/discussions/25615
    branches: [main, beta]
  pull_request:
    branches: [main, beta]
  schedule:
    # run daily at 00:00
    - cron: 0 0 * * *

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  get-playwright-versions:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - id: get-min-pw-version
        run: |
          value=$(node -p 'require("./package.json").peerDependencies["@playwright/test"].match(/\d+\.\d+/)[0]')
          echo "value=$value" >> "$GITHUB_OUTPUT"
      - id: get-versions
        env:
          MIN_PW_VERSION: ${{ steps.get-min-pw-version.outputs.value }}
        run: |
          # Scheduled runs should cover only a real beta and skip when beta is already obsolete.
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            versions=$(node scripts/get-pw-versions.ts beta)
          else
            versions=$(node scripts/get-pw-versions.ts "$MIN_PW_VERSION")
          fi
          echo "versions=$versions" >> "$GITHUB_OUTPUT"

  test:
    needs: get-playwright-versions
    if: needs.get-playwright-versions.outputs.versions != '[]'
    # Older versions of PW don't support ubuntu-24.04
    # See: https://github.com/microsoft/playwright/issues/30368
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        playwrightVersion: ${{ fromJson(needs.get-playwright-versions.outputs.versions) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20 # run on the minimal supported Node version
          cache: 'npm'
      - run: npm ci
      - run: >
          npm install @playwright/test@${{ matrix.playwrightVersion }}
          @playwright/experimental-ct-react@${{ matrix.playwrightVersion }}

      - run: npx playwright install --with-deps chromium
      - run: npm test
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: test-results-${{ matrix.playwrightVersion }}
          path: |
            test/**/test-results/
            test/**/actual-reports/
            test/**/blob-report/ 
            test/**/.features-gen/
          retention-days: 1
          if-no-files-found: ignore
